<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My CI/CD Project Showcase</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #fff;
            text-align: center;
            padding-top: 100px;
            margin: 0;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
        }
        .details {
            font-size: 1.2em;
            margin-top: 15px;
        }
        .highlight {
            background: rgba(255,255,255,0.1);
            padding: 12px 24px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 25px;
        }
        .footer {
            margin-top: 60px;
            font-size: 0.9em;
            color: #ddd;
        }
    </style>
</head>
<body>
    <h1>🚀 Deployment Successful!</h1>
    <div class="details">
        This project demonstrates <strong>Continuous Integration & Delivery</strong><br>
        built with <strong>Jenkins</strong> and served via <strong>Nginx</strong>.
    </div>
    <div class="highlight">
        Build Number: ${BUILD_NUMBER}<br>
        Deployed at: ${BUILD_TIMESTAMP}
    </div>
    <div class="footer">
        Showcasing DevOps automation on LinkedIn ✨
    </div>
</body>
</html>
